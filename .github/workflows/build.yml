name: Build
on:
  push:
    branches:
      - main
    tags:
      - v*
  pull_request:

defaults:
  run:
    shell: bash

jobs:
  fissix:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14", "3.15"]
        os: [macOS-latest, ubuntu-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set Up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          allow-prereleases: true
      - name: Install
        if: matrix.python-version != '3.15'
        run: make EXTRAS=dev install
      - name: Install (test only)
        if: matrix.python-version == '3.15'
        run: |
          python -m pip install -U pip
          python -m pip install -Ue .
          python -m pip install pytest
      - name: Test
        run: make test
      - name: Lint
        if: matrix.python-version != '3.15'
        run: make lint

  check-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: true
      - name: Set up git
        run: |
          git config user.email "ci@github.com"
          git config user.name "CI"
          git checkout -b base origin/base
          git checkout -
      - name: Set Up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      - name: Set up venv with black
        run: |
          python -m venv .venv
          .venv/bin/pip install black==26.3.1 -q
      - name: Run update.sh
        run: |
          output=$(bash scripts/update.sh 2>&1)
          echo "$output"
          echo "$output" | grep -q "DONE: No upstream changes to lib2to3"
