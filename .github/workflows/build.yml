name: Build
on:
  push:
    branches:
      - main
    tags:
      - v*
  pull_request:

defaults:
  run:
    shell: bash

jobs:
  check-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: true
      - name: Set Up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install sync dependencies
        run: |
          python -m pip install -U pip
          python -m pip install \
            black==$(grep 'black==' pyproject.toml | grep -oP '[0-9][^"]*') \
            ufmt==$(grep 'ufmt==' pyproject.toml | grep -oP '[0-9][^"]*') \
            usort==$(grep 'usort==' pyproject.toml | grep -oP '[0-9][^"]*')
      - name: Check fissix/ is in sync with cpython submodule
        run: make check-sync

  fissix:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14", "3.15"]
        os: [macOS-latest, ubuntu-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set Up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          allow-prereleases: true
      - name: Install
        if: matrix.python-version != '3.15'
        run: make EXTRAS=dev install
      - name: Install (test only)
        if: matrix.python-version == '3.15'
        run: |
          python -m pip install -U pip
          python -m pip install -Ue .
          python -m pip install pytest
      - name: Test
        run: make test
      - name: Lint
        if: matrix.python-version != '3.15'
        run: make lint
