name: Build
on:
  push:
    branches:
      - main
    tags:
      - v*
  pull_request:

defaults:
  run:
    shell: bash

jobs:
  fissix:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14", "3.15"]
        os: [macOS-latest, ubuntu-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set Up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          allow-prereleases: true
      - name: Install
        if: matrix.python-version != '3.15'
        run: make EXTRAS=dev install
      - name: Install (test only)
        if: matrix.python-version == '3.15'
        run: |
          python -m pip install -U pip
          python -m pip install -Ue .
          python -m pip install pytest
      - name: Test
        run: make test
      - name: Lint
        if: matrix.python-version != '3.15'
        run: make lint

  check-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: true
      - name: Set up git
        run: |
          git config user.email "ci@github.com"
          git config user.name "CI"
          # For PRs, fetch base from the source fork (not origin=amyreese/fissix)
          HEAD_REPO="${{ github.event.pull_request.head.repo.clone_url }}"
          if [[ -n "$HEAD_REPO" ]]; then
            git remote add head-fork "$HEAD_REPO"
            echo "BASE_REMOTE=head-fork" >> "$GITHUB_ENV"
          fi
          # amyreese/fissix:base points to cpython 3.9; graingert/fissix:base has 3.12.
          # Add graingert as a remote so update.sh can fetch the correct base.
          git remote add graingert https://github.com/graingert/fissix
      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y rsync patch
      - name: Set Up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      - name: Set up venv with black
        run: |
          python -m venv .venv
          .venv/bin/pip install black==26.3.1 -q
      - name: Run update.sh and ensure no diffs
        env:
          BASE_REMOTE: graingert
        run: |
          set -euo pipefail
          bash scripts/update.sh
