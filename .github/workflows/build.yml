name: Build
on:
  push:
    branches:
      - main
    tags:
      - v*
  pull_request:

defaults:
  run:
    shell: bash

jobs:
  check-sync:
    name: Verify fissix/ matches update.sh output
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: true
      - name: Fetch cpython tags for git describe
        run: git -C cpython fetch --tags --depth=50
      - name: Set Up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install
        run: make EXTRAS=dev install
      - name: Verify sync is clean
        run: scripts/update.sh --check

  fissix:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.8", "3.9", "3.10", "3.11", "3.12"]
        os: [macOS-13, ubuntu-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set Up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: make EXTRAS=dev install
      - name: Test
        run: make test
      - name: Lint
        run: make lint
